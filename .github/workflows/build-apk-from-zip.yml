name: Build APK from ZIP

on:
  push:
    paths:
      - "*.zip"
      - ".github/workflows/build-apk-from-zip.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: ZIP entpacken
        run: |
          rm -rf extracted
          mkdir extracted

          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "Keine ZIP-Datei im Repo gefunden."
            exit 1
          fi

          echo "Entpacke: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted

          echo "Entpackte Dateien:"
          find extracted -maxdepth 6 -type f | head -n 200

      - name: Android-Projekt finden
        run: |
          PROJECT_DIR=$(find extracted \( -name settings.gradle -o -name settings.gradle.kts \) -type f -exec dirname {} \; | head -n 1)

          if [ -z "$PROJECT_DIR" ]; then
            echo "Kein Android-Projekt gefunden. settings.gradle oder settings.gradle.kts fehlt."
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Android-Projekt gefunden in: $PROJECT_DIR"

      - name: Gradle einrichten
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.13

      - name: Debug APK bauen
        run: |
          cd "$PROJECT_DIR"
          gradle assembleDebug --stacktrace

      - name: APK als Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: extracted/**/build/outputs/apk/debug/*.apk
