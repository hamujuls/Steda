name: Build APK from ZIP

on:
  push:
    paths:
      - "*.zip"
      - ".github/workflows/build-apk-from-zip.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle einrichten
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.13

      - name: ZIP entpacken
        run: |
          rm -rf extracted
          mkdir extracted

          ZIP_FILE=$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "Keine ZIP-Datei im Hauptordner der Repo gefunden."
            exit 1
          fi

          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
          echo "Gefundene ZIP-Datei: $ZIP_FILE"

          unzip -q "$ZIP_FILE" -d extracted

          echo "Entpackte Dateien:"
          find extracted -maxdepth 8 -type f | head -n 300

      - name: Android-Projekt finden
        run: |
          PROJECT_DIR=$(find extracted \( -name settings.gradle -o -name settings.gradle.kts \) -type f -exec dirname {} \; | head -n 1)

          if [ -z "$PROJECT_DIR" ]; then
            echo "Kein Android-Projekt gefunden."
            echo "Es fehlt settings.gradle oder settings.gradle.kts."
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Android-Projekt gefunden in: $PROJECT_DIR"

      - name: Debug APK bauen
        run: |
          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            echo "gradlew gefunden. Baue mit Gradle Wrapper."
            chmod +x ./gradlew
            ./gradlew assembleDebug --stacktrace
          else
            echo "gradlew fehlt. Baue mit installiertem Gradle 8.13."
            gradle assembleDebug --stacktrace
          fi

      - name: APK als Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: extracted/**/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: ZIP-Datei aus Repository löschen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -f "$ZIP_FILE"

          if git diff --quiet; then
            echo "Keine ZIP-Datei zum Löschen gefunden oder keine Änderung nötig."
          else
            git add -u
            git commit -m "Remove uploaded project ZIP after APK build [skip ci]"
            git push
          fi
